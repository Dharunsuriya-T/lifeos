services:
  postgres:
    image: postgres:17

    container_name: lifeos-postgres

    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos_user
      POSTGRES_PASSWORD: lifeos_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: