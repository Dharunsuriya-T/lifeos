server:
  port: 8081

spring:
  application:
    name: lifeos-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/lifeos?options=-c%20TimeZone=Asia/Kolkata
    username: lifeos_user
    password: lifeos_password

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.security: INFO

jwt:
  secret: 7ecbe46f0a0f0c4e18d6d4fdf72f16c19f8e0f75d54f7f03d9f4bcd1eab7c5f
  access-token-expiration: 900000
  refresh-token-expiration: 604800000


